# For installation and configuration options, refer to the [installation instructions](https://github.com/elastic/opentelemetry/blob/main/docs/kubernetes/operator/README.md)

# For advanced configuration options, refer to the [official OpenTelemetry Helm chart](https://github.com/open-telemetry/opentelemetry-helm-charts/blob/main/charts/opentelemetry-kube-stack/values.yaml)
# This file has been tested together with opentelemetry-kube-stack helm chart version: 0.3.3
opentelemetry-operator:
  manager:
    extraArgs:
      - --enable-go-instrumentation
  admissionWebhooks:
    certManager:
      enabled: false # For production environments, it is [recommended to use cert-manager for better security and scalability](https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-operator#tls-certificate-requirement).
    autoGenerateCert:
      enabled: true # Enable/disable automatic certificate generation. Set to false if manually managing certificates.
      recreate: true # Force certificate regeneration on updates. Only applicable if autoGenerateCert.enabled is true.
crds:
  create: true # Install the OpenTelemetry Operator CRDs.
defaultCRConfig:
  image:
    repository: "docker.elastic.co/elastic-agent/elastic-agent"
    tag: "9.3.0"
  targetAllocator:
    enabled: false # Enable/disable the Operator's Target allocator.
    # Refer to: https://github.com/open-telemetry/opentelemetry-operator/tree/main/cmd/otel-allocator
  resources:
    requests:
      memory: "500Mi"
      cpu: "250m"
    limits:
      memory: "700Mi"
      cpu: "350m"
clusterRole:
  rules:
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get"]
    # Required by the k8s_events receiver
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["get", "list", "watch"]
# `clusterName` specifies the name of the Kubernetes cluster. It sets the 'k8s.cluster.name' field.
# Cluster Name is automatically detected for EKS/GKE/AKS. Add the below value in environments where cluster name cannot be detected.
# clusterName: myClusterName
collectors:
  cluster-azure:
    image:
      repository: "otel/opentelemetry-collector-contrib"
      pullPolicy: Always 
      tag: "0.145.0"
    # suffix: cluster-eventhub
    fullnameOverride: "opentelemetry-kube-stack-cluster-azure"
    replicas: 2 
    mode: statefulset
    enabled: true
    serviceAccount: "opentelemetry-kube-stack-cluster-azure-collector"
    podSecurityContext:
      fsGroup: 1001
      runAsUser: 1001
      runAsGroup: 1001    
    podLabels:
      azure.workload.identity/use: "true"
    # resources:
    #   limits:
    #     cpu: 1000m
    #     memory: 8000Mi
    #   requests:
    #     cpu: 750m
    #     memory: 5000Mi
    volumes:
      - name: file-storage-otc-eventhub-pv
        persistentVolumeClaim:
          claimName: file-storage-otc-eventhub-pvc
      - name: azure-identity-token
        projected:
          sources:
            - serviceAccountToken:
                path: azure-identity-token
                expirationSeconds: 3600
                audience: api://AzureADTokenExchange          
    volumeMounts:
      - mountPath: /var/lib/storage/otc
        name: file-storage-otc-eventhub-pv
        readOnly: false
      - name: azure-identity-token
        mountPath: /var/run/secrets/azure/tokens
        readOnly: true            
    env:
      - name: EH_NAME_RESOURCE_LOGS
        value: "resource_logs"
      - name: EH_NAME_ACTIVITY_LOGS
        value: "activity_logs"    
      - name: EH_SHARED_ACCESS_KEYNAME
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: eh_shared_access_keyname
      - name: EH_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: eh_endpoint          
      - name: EH_SHARED_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: eh_shared_access_key
      - name: DATA_STREAM_NAMESPACE
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: data_stream_namespace
      - name: SUBSCRIPTION_ID
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: subscription_id
      - name: RESOURCE_GROUP
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: resource_group
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: AZURE_TENANT_ID
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: azure_tenant_id
      - name: AZURE_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: azure_client_id
      - name: AZURE_FEDERATED_TOKEN_FILE
        value: "/var/run/secrets/azure/tokens/azure-identity-token"                                           
            
    config:
      receivers:
        #CHANGE THIS VALUE FOR YOUR ENV/SUBSCRIPTION
        azure_event_hub/resource_logs:
          connection: Endpoint=${env:EH_ENDPOINT};SharedAccessKeyName=${env:EH_SHARED_ACCESS_KEYNAME};SharedAccessKey=${env:EH_SHARED_ACCESS_KEY};EntityPath=${env:EH_NAME_RESOURCE_LOGS}
          storage: file_storage/otc
        azure_event_hub/activity_logs:
          connection: Endpoint=${env:EH_ENDPOINT};SharedAccessKeyName=${env:EH_SHARED_ACCESS_KEYNAME};SharedAccessKey=${env:EH_SHARED_ACCESS_KEY};EntityPath=${env:EH_NAME_ACTIVITY_LOGS}
          storage: file_storage/otc
          #time_formats:
            #logs: ["01/02/2006 15:04:05","2006-01-02 15:04:05","2006-01-02T15:04:05Z07:00"]   
        azuremonitor:
          subscription_ids: ["${env:SUBSCRIPTION_ID}"]
          auth:
            authenticator: azureauth
          
          # Optional: Filter to specific resource groups
          # resource_groups:
          #   - "${env:RESOURCE_GROUP}"

          
          # Optional: Filter to specific Azure services
          services:
            - "Microsoft.DBforPostgreSQL/flexibleServers"
            - "Microsoft.CognitiveServices/accounts"
            - "Microsoft.ApiManagement/service"
            - "Microsoft.Web/sites"
          metrics:
            "Microsoft.DBforPostgreSQL/flexibleServers":   # scraper will fetch only the metrics listed below:
              connections_failed: []
              tup_deleted: []
              is_db_alive: []
              active_connections: []
              maximum_used_transactionIDs: []
              connections_succeeded: []
              cpu_percent: []
              deadlocks: []
              iops: []
              memory_percent: []
              read_throughput: []
              storage_percent: []
            #Metrics are automatically split by all available dimensions for that resource type
            #Since we need metrics of all dimnesions for "Microsoft.CognitiveServices/accounts",
            #dimensions are not explicitly set. If we want specific dimensions, we need to set overrides: 
            "Microsoft.CognitiveServices/accounts":
              AzureOpenAIAvailabilityRate: []
            "Microsoft.ApiManagement/service":
              Requests: []
              Capacity: []
              CpuPercent_Gateway: []
              MemoryPercent_Gateway: []
              BackendDuration: []
              Duration: []
            "Microsoft.Web/sites":
              Http5xx: []
              Http4xx: []
              FunctionExecutionCount: []
              MemoryWorkingSet: []      

          collection_interval: 60s
          initial_delay: 1s
          
          # Optional: Use Batch API for better rate limits (recommended for large environments)
          use_batch_api: true    
      processors:
        resourcedetection/aks:
          # Detects resources from environment variables and AKS (Azure Kubernetes Service).
          detectors: [env, aks]
          timeout: 2s
          override: true
          aks:
            resource_attributes:
              k8s.cluster.name:
                enabled: true
        resource/hostname:
          attributes:
            - key: host.name
              from_attribute: k8s.node.name
              action: upsert
        # [K8s Attributes Processor](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/k8sattributesprocessor)
        k8sattributes:
          passthrough: false # Annotates resources with the pod IP and does not try to extract any other metadata.
          pod_association:
            # Below association takes a look at the k8s.pod.ip and k8s.pod.uid resource attributes or connection's context, and tries to match it with the pod having the same attribute.
            - sources:
                - from: resource_attribute
                  name: k8s.pod.ip
            - sources:
                - from: resource_attribute
                  name: k8s.pod.uid
            - sources:
                - from: connection
          extract:
            metadata:
              - "k8s.namespace.name"
              - "k8s.deployment.name"
              - "k8s.replicaset.name"
              - "k8s.statefulset.name"
              - "k8s.daemonset.name"
              - "k8s.cronjob.name"
              - "k8s.job.name"
              - "k8s.node.name"
              - "k8s.pod.name"
              - "k8s.pod.ip"
              - "k8s.pod.uid"
              - "k8s.pod.start_time"
              # Service attributes added based on https://opentelemetry.io/docs/specs/semconv/non-normative/k8s-attributes/#service-attributes
              - "service.name"
              - "service.version"
              - "service.instance.id"      
        # batch:
        #   send_batch_size: 1000
        #   timeout: 1s
        #   send_batch_max_size: 0 
        resource:
          attributes:
            -  key: data_stream.namespace
               action: upsert
               #CHANGE THIS VALUE FOR YOUR ENV/SUBSCRIPTION
               #This is a common namespace for both SL & UI 
               value: ${env:DATA_STREAM_NAMESPACE}
        resource/resource_logs_dataset:
          attributes:
            -  key: data_stream.dataset
               action: upsert
               value: azure_eventhub_resource_logs
        resource/activity_logs_dataset:
          attributes:
            -  key: data_stream.dataset
               action: upsert
               value: azure_eventhub_activity_logs
        # resourcedetection/env:
        #   detectors: [env]
        #   timeout: 2s
        #   override: false
      exporters:
        debug:
          verbosity: basic
        debug/det:
          verbosity: detailed
        otlp_grpc/gateway:
          endpoint: "http://opentelemetry-kube-stack-gateway-collector:4317"
          tls:
            insecure: true
      extensions:
        file_storage/otc:
          directory: /var/lib/storage/otc/${env:POD_NAME}
          timeout: 10s
          create_directory: true
        azureauth:
          workload_identity:
            client_id: ${env:AZURE_CLIENT_ID}
            federated_token_file: ${env:AZURE_FEDERATED_TOKEN_FILE}
            tenant_id: ${env:AZURE_TENANT_ID}
      service:
        extensions: [file_storage/otc, azureauth] 
        #telemetry:
          #logs:
            #level: debug
        pipelines:
          logs/resource_logs:
            receivers: [azure_event_hub/resource_logs]
            processors: [resource,resource/resource_logs_dataset, k8sattributes, resourcedetection/aks, resource/hostname]
            exporters: [debug,otlp_grpc/gateway]
          logs/activity_logs:
            receivers: [azure_event_hub/activity_logs]
            processors: [resource,resource/activity_logs_dataset, k8sattributes, resourcedetection/aks, resource/hostname]
            exporters: [debug,otlp_grpc/gateway]
          metrics/azuremonitor:
            receivers: [azuremonitor]
            processors: [resource, k8sattributes, resourcedetection/aks, resource/hostname]
            exporters: [debug/det,otlp_grpc/gateway]
  #  Cluster is a K8s deployment EDOT collector focused on gathering telemetry
  #  at the cluster level (Kubernetes Events and cluster metrics).
  cluster:
    enabled: true
    fullnameOverride: "opentelemetry-kube-stack-cluster-stats"
    env:
      - name: ELASTIC_AGENT_OTEL
        value: '"true"'
      - name: DATA_STREAM_NAMESPACE
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: data_stream_namespace        
    config:
      exporters:
        # [Debug exporter](https://github.com/open-telemetry/opentelemetry-collector/blob/main/exporter/debugexporter/README.md)
        debug:
          verbosity: basic # Options: basic, detailed. Choose verbosity level for debug logs.
          # [Elasticsearch exporter](https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/exporter/elasticsearchexporter/README.md)
        otlp/gateway:
          endpoint: "http://opentelemetry-kube-stack-gateway-collector:4317"
          tls:
            insecure: true
      processors:
        # [Resource Detection Processor](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/resourcedetectionprocessor)
        # resourcedetection/eks:
        #   # Detects resources from environment variables and EKS (Elastic Kubernetes Service).
        #   detectors: [env, eks]
        #   timeout: 15s
        #   override: true
        #   eks:
        #     resource_attributes:
        #       k8s.cluster.name:
        #         enabled: true
        # resourcedetection/gcp:
        #   # Detects resources from environment variables and GCP (Google Cloud Platform).
        #   detectors: [env, gcp]
        #   timeout: 2s
        #   override: true
        resourcedetection/aks:
          # Detects resources from environment variables and AKS (Azure Kubernetes Service).
          detectors: [env, aks]
          timeout: 2s
          override: true
          aks:
            resource_attributes:
              k8s.cluster.name:
                enabled: true
        resource/hostname:
          attributes:
            - key: host.name
              from_attribute: k8s.node.name
              action: upsert
        resource:
          attributes:
            -  key: data_stream.namespace
               action: upsert
               value: ${env:DATA_STREAM_NAMESPACE}              
        # [K8s Attributes Processor](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/k8sattributesprocessor)
        k8sattributes:
          passthrough: false # Annotates resources with the pod IP and does not try to extract any other metadata.
          pod_association:
            # Below association takes a look at the k8s.pod.ip and k8s.pod.uid resource attributes or connection's context, and tries to match it with the pod having the same attribute.
            - sources:
                - from: resource_attribute
                  name: k8s.pod.ip
            - sources:
                - from: resource_attribute
                  name: k8s.pod.uid
            - sources:
                - from: connection
          extract:
            metadata:
              - "k8s.namespace.name"
              - "k8s.deployment.name"
              - "k8s.replicaset.name"
              - "k8s.statefulset.name"
              - "k8s.daemonset.name"
              - "k8s.cronjob.name"
              - "k8s.job.name"
              - "k8s.node.name"
              - "k8s.pod.name"
              - "k8s.pod.ip"
              - "k8s.pod.uid"
              - "k8s.pod.start_time"
              # Service attributes added based on https://opentelemetry.io/docs/specs/semconv/non-normative/k8s-attributes/#service-attributes
              - "service.name"
              - "service.version"
              - "service.instance.id"
      receivers:   
        # [K8s Events Receiver](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/k8seventsreceiver)
        k8s_events: {}
        # [K8s Objects Receiver](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/k8sobjectsreceiver)
        # NOTE: The k8sobjects receiver for K8s Events collection is being replaced by the k8s_events receiver, it might be removed in future versions of this configuration
        k8sobjects:
          objects:
            - name: events
              mode: "watch"
              group: "events.k8s.io"
              exclude_watch_type:
                - "DELETED"
        # [K8s Cluster Receiver](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/k8sclusterreceiver)
        k8s_cluster:
          collection_interval: 60s
          auth_type: serviceAccount # Determines how to authenticate to the K8s API server. This can be one of none (for no auth), serviceAccount (to use the standard service account token provided to the agent pod), or kubeConfig to use credentials from ~/.kube/config.
          node_conditions_to_report:
            - Ready
            - MemoryPressure
          allocatable_types_to_report:
            - cpu
            - memory
          metrics:
            k8s.pod.status_reason:
              enabled: true
          resource_attributes:
            k8s.kubelet.version:
              enabled: true
            os.description:
              enabled: true
            os.type:
              enabled: true
            k8s.container.status.last_terminated_reason:
              enabled: true
      # [Service Section](https://opentelemetry.io/docs/collector/configuration/#service)
      service:
        pipelines:
          metrics:
            exporters:
              - debug
              - otlp/gateway
            processors:
              - k8sattributes
              # - resourcedetection/eks
              # - resourcedetection/gcp
              - resourcedetection/aks
              - resource/hostname
              - resource
            receivers:
              - k8s_cluster
          logs:
            receivers:
              - k8sobjects
              - k8s_events
            processors:
              # - resourcedetection/eks
              # - resourcedetection/gcp
              - resourcedetection/aks
              - resource/hostname
            exporters:
              - debug
              - otlp/gateway
  #  Daemon is a K8s daemonset EDOT collector focused on gathering telemetry at
  #  node level and exposing an OTLP endpoint for data ingestion.
  #  Auto-instrumentation SDKs will use this endpoint.
  daemon:
    fullnameOverride: "opentelemetry-kube-stack-daemon"
    env:
      - name: ELASTIC_AGENT_OTEL
        value: '"true"'
      - name: DATA_STREAM_NAMESPACE
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: data_stream_namespace        
    presets:
      logsCollection:
        enabled: true # Enable/disable the collection of node's logs.
        storeCheckpoints: true # Store checkpoints for log collection, allowing for resumption from the last processed log.
      kubernetesEvents:
        enabled: false
      clusterMetrics:
        enabled: false
    hostNetwork: true # Use the host's network namespace. This allows the daemon to access the network interfaces of the host directly.
    securityContext: # Run the daemon as the root user and group for proper metrics collection.
      runAsUser: 0
      runAsGroup: 0
    scrape_configs_file: "" # [Prometheus metrics](https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-kube-stack#scrape_configs_file-details)
    config:
      exporters:
        # [Debug exporter](https://github.com/open-telemetry/opentelemetry-collector/blob/main/exporter/debugexporter/README.md)
        debug:
          verbosity: basic
        otlp/gateway:
          endpoint: "http://opentelemetry-kube-stack-gateway-collector-headless:4317"
          tls:
            insecure: true
      processors:
        # [Batch Processor](https://github.com/open-telemetry/opentelemetry-collector/tree/main/processor/batchprocessor)
        # inherit any values from helm chart
        batch: {}
        batch/metrics:
          # explicitly set send_batch_max_size to 0, as splitting metrics requests may cause version_conflict_engine_exception in TSDB
          send_batch_max_size: 0
          timeout: 1s
        # [Resource Detection Processor](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/resourcedetectionprocessor)
        # resourcedetection/eks:
        #   # Detects resources from environment variables and EKS (Elastic Kubernetes Service).
        #   detectors: [env, eks]
        #   timeout: 15s
        #   override: true
        #   eks:
        #     resource_attributes:
        #       k8s.cluster.name:
        #         enabled: true
        # resourcedetection/gcp:
        #   # Detects resources from environment variables and GCP (Google Cloud Platform).
        #   detectors: [env, gcp]
        #   timeout: 2s
        #   override: true
        resourcedetection/aks:
          # Detects resources from environment variables and AKS (Azure Kubernetes Service).
          detectors: [env, aks]
          timeout: 2s
          override: true
          aks:
            resource_attributes:
              k8s.cluster.name:
                enabled: true
        resource/hostname:
          attributes:
            - key: host.name
              from_attribute: k8s.node.name
              action: upsert
        resourcedetection/system:
          # Detects resources from the system and EC2 instances.
          #detectors: ["system", "ec2"]
          detectors: ["system"]
          system:
            hostname_sources: ["os"]
            resource_attributes:
              host.name:
                enabled: true
              host.id:
                enabled: false
              host.arch:
                enabled: true
              host.ip:
                enabled: true
              host.mac:
                enabled: true
              host.cpu.vendor.id:
                enabled: true
              host.cpu.family:
                enabled: true
              host.cpu.model.id:
                enabled: true
              host.cpu.model.name:
                enabled: true
              host.cpu.stepping:
                enabled: true
              host.cpu.cache.l2.size:
                enabled: true
              os.description:
                enabled: true
              os.type:
                enabled: true
          # ec2:
          #   resource_attributes:
          #     host.name:
          #       enabled: false
          #     host.id:
          #       enabled: true
        resource/cloud:
          attributes:
            - key: cloud.instance.id
              from_attribute: host.id
              action: insert
        resource:
          attributes:
            -  key: data_stream.namespace
               action: upsert
               value: ${env:DATA_STREAM_NAMESPACE}
        resource/dataset:
          attributes:
            -  key: data_stream.dataset
               action: upsert
               value: filelog_pod              
        # [K8s Attributes Processor](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/k8sattributesprocessor)
        k8sattributes:
          filter:
            # Only retrieve pods running on the same node as the collector
            node_from_env_var: OTEL_K8S_NODE_NAME
          passthrough: false
          pod_association:
            # Below association takes a look at the k8s.pod.ip and k8s.pod.uid resource attributes or connection's context, and tries to match it with the pod having the same attribute.
            - sources:
                - from: resource_attribute
                  name: k8s.pod.ip
            - sources:
                - from: resource_attribute
                  name: k8s.pod.uid
            - sources:
                - from: connection
          extract:
            metadata:
              - "k8s.namespace.name"
              - "k8s.deployment.name"
              - "k8s.replicaset.name"
              - "k8s.statefulset.name"
              - "k8s.daemonset.name"
              - "k8s.cronjob.name"
              - "k8s.job.name"
              - "k8s.node.name"
              - "k8s.pod.name"
              - "k8s.pod.ip"
              - "k8s.pod.uid"
              - "k8s.pod.start_time"
              # Service attributes added based on https://opentelemetry.io/docs/specs/semconv/non-normative/k8s-attributes/#service-attributes
              - "service.name"
              - "service.version"
              - "service.instance.id"
      receivers:
        # [OTLP Receiver](https://github.com/open-telemetry/opentelemetry-collector/tree/main/receiver/otlpreceiver)
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        # [File Log Receiver](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/filelogreceiver)
        filelog:
          poll_interval: 60s
          retry_on_failure:
            enabled: true
          start_at: end
          exclude:
            # exlude collector logs
            - /var/log/pods/*opentelemetry-kube-stack*/*/*.log
          include:
            - /var/log/pods/*/*/*.log
          include_file_name: false
          include_file_path: true
          operators:
            - id: container-parser # Extract container's metadata
              type: container
        # [Hostmetrics Receiver](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/hostmetricsreceiver)
        hostmetrics:
          collection_interval: 60s
          root_path: /hostfs # Mounted node's root file system
          scrapers:
            cpu:
              metrics:
                system.cpu.utilization:
                  enabled: true
                system.cpu.logical.count:
                  enabled: true
            memory:
              metrics:
                system.memory.utilization:
                  enabled: true
            # process scraper is disabled for now: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/39423
            #process:
            #  mute_process_exe_error: true
            #  mute_process_io_error: true
            #  mute_process_user_error: true
            #  metrics:
            #    process.threads:
            #      enabled: true
            #    process.open_file_descriptors:
            #      enabled: true
            #    process.memory.utilization:
            #      enabled: true
            #    process.disk.operations:
            #      enabled: true
            network: {}
            processes: {}
            load: {}
            disk: {}
            filesystem:
              exclude_mount_points:
                mount_points:
                  - /dev/*
                  - /proc/*
                  - /sys/*
                  - /run/k3s/containerd/*
                  - /var/lib/docker/*
                  - /var/lib/kubelet/*
                  - /snap/*
                match_type: regexp
              exclude_fs_types:
                fs_types:
                  - autofs
                  - binfmt_misc
                  - bpf
                  - cgroup2
                  - configfs
                  - debugfs
                  - devpts
                  - devtmpfs
                  - fusectl
                  - hugetlbfs
                  - iso9660
                  - mqueue
                  - nsfs
                  - overlay
                  - proc
                  - procfs
                  - pstore
                  - rpc_pipefs
                  - securityfs
                  - selinuxfs
                  - squashfs
                  - sysfs
                  - tracefs
                match_type: strict
        # [Kubelet Stats Receiver](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/kubeletstatsreceiver)
        kubeletstats:
          auth_type: serviceAccount # Authentication mechanism with the Kubelet endpoint, refer to: https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/kubeletstatsreceiver#configuration
          collection_interval: 60s
          endpoint: ${env:OTEL_K8S_NODE_NAME}:10250
          node: '${env:OTEL_K8S_NODE_NAME}'
          # Required to work for all CSPs without an issue
          insecure_skip_verify: true
          k8s_api_config:
            auth_type: serviceAccount
          metrics:
            k8s.pod.memory.node.utilization:
              enabled: true
            k8s.pod.cpu.node.utilization:
              enabled: true
            k8s.container.cpu_limit_utilization:
              enabled: true
            k8s.pod.cpu_limit_utilization:
              enabled: true
            k8s.container.cpu_request_utilization:
              enabled: true
            k8s.container.memory_limit_utilization:
              enabled: true
            k8s.pod.memory_limit_utilization:
              enabled: true
            k8s.container.memory_request_utilization:
              enabled: true
            k8s.node.uptime:
              enabled: true
            k8s.node.cpu.usage:
              enabled: true
            k8s.pod.cpu.usage:
              enabled: true
          extra_metadata_labels:
            - container.id
      # [Service Section](https://opentelemetry.io/docs/collector/configuration/#service)
      service:
        pipelines:
          # Disable default non used kube-stack Helm Chart pipelines
          logs: null
          metrics: null
          traces: null
          logs/node:
            receivers:
              - filelog
            processors:
              - batch
              - k8sattributes
              - resourcedetection/system
              # - resourcedetection/eks
              # - resourcedetection/gcp
              - resourcedetection/aks
              - resource/hostname
              - resource/cloud
              - resource
              - resource/dataset
            exporters:
              - otlp/gateway
          metrics/node/otel:
            receivers:
              - kubeletstats
              - hostmetrics
            processors:
              - batch/metrics
              - k8sattributes
              - resourcedetection/system
              # - resourcedetection/eks
              # - resourcedetection/gcp
              - resourcedetection/aks
              - resource/hostname
              - resource/cloud
              - resource
            exporters:
              # - debug
              - otlp/gateway
          metrics/otel-apm:
            receivers:
              - otlp
            processors:
              - batch/metrics
              - resource/hostname
              - resource
            exporters:
              - otlp/gateway
          logs/apm:
            receivers:
              - otlp
            processors:
              - batch
              - resource/hostname
              - resource
            exporters:
              - otlp/gateway
          traces/apm:
            receivers:
              - otlp
            processors:
              - batch
              - resource/hostname
              - resource
            exporters:
              - otlp/gateway
  #  Gateway is a K8s deployment EDOT collector focused on processing and
  #  forwarding telemetry to an Elasticsearch endpoint.
  gateway:
    fullnameOverride: "opentelemetry-kube-stack-gateway"
    resources:
      limits:
        cpu: 1500m
        memory: 2000Mi
      requests:
        cpu: 250m
        memory: 500Mi
    suffix: gateway
    mode: statefulset
    replicas: 2
    enabled: true
    securityContext:
      runAsGroup: 1000
    volumes:
      - name: file-storage-otc-pv
        persistentVolumeClaim:
          claimName: file-storage-otc-pvc
      - name: file-storage-elasticapm-pv
        persistentVolumeClaim:
          claimName: file-storage-elasticapm-pvc
    volumeMounts:
      - mountPath: /var/lib/storage/otc
        name: file-storage-otc-pv
        readOnly: false
      - mountPath: /var/lib/storage/elasticapm
        name: file-storage-elasticapm-pv
        readOnly: false                    
    env:
      - name: ELASTIC_AGENT_OTEL
        value: '"true"'
      - name: ELASTIC_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: elastic_endpoint
      - name: ELASTIC_API_KEY
        valueFrom:
          secretKeyRef:
            name: elastic-secret-otel
            key: elastic_api_key
      - name: GOMAXPROCS
        valueFrom:
          resourceFieldRef:
            resource: limits.cpu
      - name: GOMEMLIMIT
        value: "1025MiB"
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name        
    config:
      connectors:
        # [Elastic APM Connector](https://github.com/elastic/opentelemetry-collector-components/tree/main/connector/elasticapmconnector)
        elasticapm:
          aggregation:
            directory: /var/lib/storage/elasticapm/${env:POD_NAME}
            # metadata_keys: [list, of, metadata, keys]
            limits:
              resource: 
                max_cardinality: 8000
              scope:
                max_cardinality: 4000
              metric:
                max_cardinality: 4000
              datapoint:
                max_cardinality: 4000
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: ${env:OTEL_K8S_POD_IP}:4317
            http:
              endpoint: ${env:OTEL_K8S_POD_IP}:4318
      processors:
        batch:
          send_batch_size: 1000
          timeout: 1s
          send_batch_max_size: 1500
        batch/metrics:
          # explicitly set send_batch_max_size to 0, as splitting metrics requests may cause version_conflict_engine_exception in TSDB
          send_batch_max_size: 0
          timeout: 1s
        # [Elastic APM Processor](https://github.com/elastic/opentelemetry-collector-components/tree/main/processor/elasticapmprocessor)
        # The processor enriches traces with elastic specific requirements.
        elasticapm: {}
      exporters:
        debug: {}
        # [Elasticsearch exporter](https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/exporter/elasticsearchexporter/README.md)
        elasticsearch/otel:
          endpoints: # List of Elasticsearch endpoints.
            - ${env:ELASTIC_ENDPOINT}
          api_key: ${env:ELASTIC_API_KEY} # API key for Elasticsearch authentication.
          # Enable in order to skip the SSL certificate Check
          # tls:
          #   insecure_skip_verify: true
          mapping:
            mode: otel
          retry:
            enabled: true
            initial_interval: 5s
            max_interval: 2m            
          sending_queue:
            enabled: true
            num_consumers: 10
            queue_size: 2000
            storage: file_storage/otc
      extensions:
        file_storage/otc:
          directory: /var/lib/storage/otc/${env:POD_NAME}
          timeout: 10s
          create_directory: true                        
      service:
        extensions: [file_storage/otc]       
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [batch/metrics]
            exporters: [debug, elasticsearch/otel]
          logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug, elasticapm, elasticsearch/otel]
          traces:
            receivers: [otlp]
            processors: [batch, elasticapm]
            exporters: [debug, elasticapm, elasticsearch/otel]
          metrics/aggregated-otel-metrics:
            receivers:
              - elasticapm
            processors: []
            exporters:
              - debug
              - elasticsearch/otel
# For more details on OpenTelemetry's zero-code instrumentation, see:
# https://opentelemetry.io/docs/concepts/instrumentation/zero-code/
instrumentation:
  name: elastic-instrumentation
  enabled: true # Enable/disable auto-instrumentation.
  env: []
  exporter:
    endpoint: http://opentelemetry-kube-stack-daemon-collector.o11y-otel.svc.cluster.local:4318 # The daemonset OpenTelemetry Collector endpoint where telemetry data will be exported.
  propagators:
    - tracecontext # W3C TraceContext propagator for distributed tracing.
    - baggage # Baggage propagator to include baggage information in trace context.
    - b3 # B3 propagator for Zipkin-based distributed tracing compatibility.
  sampler:
    type: parentbased_traceidratio # Sampler type
    argument: "1.0" # Sampling rate set to 100% (all traces are sampled).
  java:
    image: docker.elastic.co/observability/elastic-otel-javaagent:1.7.0
  nodejs:
    image: docker.elastic.co/observability/elastic-otel-node:1.6.0
  dotnet:
    image: docker.elastic.co/observability/elastic-otel-dotnet:1.1.0
  python:
    image: docker.elastic.co/observability/elastic-otel-python:1.10.0
    env:
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
        value: "true"
      - name: OTEL_LOG_LEVEL
        value: debug    
  go:
    image: ghcr.io/open-telemetry/opentelemetry-go-instrumentation/autoinstrumentation-go:v0.23.0
    env:
      # - name: OTEL_GO_AUTO_TARGET_EXE
      #   value: <binary-path>
      - name: OTEL_LOG_LEVEL
        value: debug    
