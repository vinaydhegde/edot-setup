apiVersion: v1
kind: PersistentVolume
metadata:
  name: file-storage-otc-eventhub-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteMany
  azureFile:
    secretName: azure-storage-secret  # Contains storage account name + key
    shareName: otel-queue
    readOnly: false
  persistentVolumeReclaimPolicy: Retain
